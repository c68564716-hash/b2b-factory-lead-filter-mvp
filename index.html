<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B工厂客户筛选系统</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#1b2430;background:#f5f7f9}*{box-sizing:border-box}body{margin:0;background:#f5f7f9}.app{width:min(1440px,calc(100% - 32px));margin:0 auto;padding:24px 0 40px}.top,.panel{background:#fff;border:1px solid #dce3ea;border-radius:8px;box-shadow:0 12px 30px rgba(38,53,71,.06)}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:22px 24px}.eyebrow{margin:0 0 5px;color:#5d6b7a;font-size:12px;font-weight:800;text-transform:uppercase}h1,h2,h3,h4,p{margin-top:0}h1{margin-bottom:0;font-size:clamp(24px,3vw,36px)}h2{margin-bottom:0;font-size:21px}.summary{display:grid;grid-template-columns:repeat(4,minmax(70px,1fr));gap:10px}.summary div{padding:10px 12px;border:1px solid #dbe4ed;border-radius:8px;background:#f8fafc;text-align:center}.summary strong{display:block;font-size:22px}.summary span{color:#5d6b7a;font-size:13px}.grid{display:grid;grid-template-columns:minmax(360px,.85fr) minmax(620px,1.15fr);gap:18px;margin-top:18px;align-items:start}.panel{padding:20px}.heading{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}.score{display:inline-flex;min-width:78px;height:48px;align-items:center;justify-content:center;gap:7px;border-radius:8px;font-size:22px;font-weight:900}.score span{font-size:13px}.a{color:#075b45;background:#dcf7ec;border:1px solid #8bd9bb}.b{color:#244d8f;background:#e3edff;border:1px solid #9dbcf5}.c{color:#77520d;background:#fff1d5;border:1px solid #efca7b}.d{color:#8d2828;background:#ffe4e4;border:1px solid #efaaa8}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}label,fieldset{display:grid;gap:7px;color:#2a3644;font-size:13px;font-weight:800}input,select,textarea{width:100%;min-height:42px;border:1px solid #cfd8e3;border-radius:6px;color:#17202c;background:#fff;padding:10px 11px;outline:none}input:focus,select:focus,textarea:focus{border-color:#3268a8;box-shadow:0 0 0 3px rgba(50,104,168,.14)}textarea{min-height:86px;resize:vertical}fieldset{margin:16px 0;padding:0;border:0}.chips,.toggles,.flags{display:flex;flex-wrap:wrap;gap:8px}.chip{min-height:34px;border:1px solid #cfd8e3;border-radius:999px;background:#fff;color:#354456;padding:7px 12px;font-size:13px;font-weight:800;cursor:pointer}.chip.selected{border-color:#3268a8;background:#eaf2fb;color:#1e4f83}.toggle{display:inline-flex;align-items:center;gap:8px;min-height:38px;border:1px solid #dce3ea;border-radius:6px;padding:8px 10px;background:#f8fafc}.toggle input{width:16px;min-height:16px;accent-color:#3268a8}.actions{display:flex;gap:10px;margin-top:16px}button{cursor:pointer}.primary,.secondary,.danger,.icon{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border-radius:6px;padding:10px 14px;font-weight:900}.primary{border:1px solid #255f9f;background:#2f6faa;color:#fff}.secondary,.icon{border:1px solid #cfd8e3;background:#fff;color:#263646}.danger{border:1px solid #efaaa8;background:#fff2f2;color:#982c2c}.search{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:14px}.table-wrap{overflow-x:auto;border:1px solid #dce3ea;border-radius:8px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid #e6edf3;padding:11px 12px;text-align:left;vertical-align:middle}th{color:#5d6b7a;background:#f8fafc;font-size:12px;text-transform:uppercase}tbody tr{cursor:pointer}tbody tr:hover,.selected{background:#eef5fb}.badge{display:inline-flex;min-width:30px;min-height:30px;align-items:center;justify-content:center;border-radius:6px;font-weight:900}.detail{margin-top:18px}.detail-grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:18px}.block{border:1px solid #dce3ea;border-radius:8px;padding:18px;background:#fbfcfd}.company{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding-bottom:16px;border-bottom:1px solid #e2e8ef}.company h3{margin-bottom:4px;font-size:22px}.company p{margin-bottom:0;color:#647283}.info{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0}.item{display:grid;gap:4px;min-height:72px;border:1px solid #dce3ea;border-radius:8px;padding:11px;background:#fff}.item small{color:#5d6b7a;font-weight:800}.item strong{overflow-wrap:anywhere}.flag{border:1px solid #d2dbe6;border-radius:999px;padding:7px 11px;color:#667586;background:#fff;font-size:13px;font-weight:900}.flag.on{border-color:#8bd9bb;color:#075b45;background:#dcf7ec}.text{margin-top:16px;border-top:1px solid #e2e8ef;padding-top:14px}.text p,.recommend p,.reason p{margin-bottom:0;color:#4a5968;line-height:1.65}.reasons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.reason{border:1px solid #cfe8dc;border-radius:8px;padding:14px;background:#f3fbf7}.reason.neg{border-color:#f1cccc;background:#fff8f8}.reason ul{margin:0;padding-left:18px;line-height:1.75}.recommend{margin-top:14px;border:1px solid #dce3ea;border-radius:8px;padding:14px;background:#fff}.empty{display:grid;place-items:center;min-height:220px;color:#607084;text-align:center}@media(max-width:1120px){.grid,.detail-grid{grid-template-columns:1fr}}@media(max-width:720px){.app{width:min(100% - 20px,1440px);padding-top:10px}.top,.heading{align-items:stretch;flex-direction:column}.top{display:grid}.summary,.form-grid,.info,.reasons{grid-template-columns:1fr}.actions{flex-direction:column}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div><p class="eyebrow">Factory Sales MVP</p><h1>B2B工厂客户筛选系统</h1></div>
      <div class="summary" id="summary"></div>
    </header>
    <section class="grid">
      <form class="panel" id="leadForm">
        <div class="heading"><div><p class="eyebrow">Lead Intake</p><h2>客户信息录入</h2></div><div class="score d" id="previewScore">0 <span>D类</span></div></div>
        <div class="form-grid">
          <label>公司名称 *<input name="companyName" required placeholder="例如 ABC Solar Ltd."></label>
          <label>国家/地区 *<input name="country" required placeholder="例如 Germany"></label>
          <label>公司网站<input name="website" placeholder="https://example.com"></label>
          <label>客户类型<select name="customerType"></select></label>
          <label>联系人<input name="contactName" placeholder="联系人姓名"></label>
          <label>邮箱<input name="email" type="email" placeholder="name@company.com"></label>
          <label>WhatsApp / 电话<input name="phone" placeholder="+1 000 000 0000"></label>
          <label>预计采购数量<input name="purchaseQuantity" placeholder="例如 100台/月 或 1MWh项目"></label>
          <label>目标价格/预算<input name="targetBudget" placeholder="预算、目标价、贸易条款"></label>
          <label>跟进状态<select name="followStatus"></select></label>
        </div>
        <fieldset><legend>感兴趣产品</legend><div class="chips" id="productChips"></div></fieldset>
        <div class="toggles">
          <label class="toggle"><input type="checkbox" name="longTermPurchase"> 是否长期采购</label>
          <label class="toggle"><input type="checkbox" name="hasProject"> 是否有具体项目</label>
          <label class="toggle"><input type="checkbox" name="needsOem"> 是否需要 OEM/ODM</label>
        </div>
        <label style="margin-top:16px">需求描述<textarea name="demandDescription" placeholder="产品规格、应用场景、项目阶段、认证要求等"></textarea></label>
        <label style="margin-top:14px">备注<textarea name="notes" placeholder="来源、沟通记录、特殊情况"></textarea></label>
        <div class="actions"><button class="primary" type="submit">保存客户</button><button class="secondary" type="button" id="resetBtn">清空重填</button></div>
      </form>
      <section class="panel">
        <div class="heading"><div><p class="eyebrow">Lead Queue</p><h2>客户列表</h2></div><button class="icon" id="sortBtn" type="button">按分数排序</button></div>
        <label class="search">搜索<input id="searchInput" placeholder="搜索公司、国家、类型、状态"></label>
        <div class="table-wrap"><table><thead><tr><th>公司名称</th><th>国家</th><th>客户类型</th><th>产品需求</th><th>分数</th><th>等级</th><th>跟进状态</th></tr></thead><tbody id="customerRows"></tbody></table></div>
      </section>
    </section>
    <section class="panel detail"><div class="heading"><div><p class="eyebrow">Lead Detail</p><h2>客户详情页</h2></div><button class="danger" id="deleteBtn" type="button">删除</button></div><div id="detailView"></div></section>
  </main>
  <script>
    const STORAGE='b2b_factory_customer_filter_customers';
    const types=['经销商','批发商','工程商','EPC','安装商','系统集成商','品牌商','工厂','个人','未知'];
    const goodTypes=new Set(['经销商','批发商','工程商','EPC','安装商','系统集成商','品牌商']);
    const products=['逆变器','UPS','储能电池','太阳能系统','OEM/ODM','其他'];
    const statuses=['未联系','已联系','等待回复','已发资料','已报价','有意向','无效客户','成交'];
    const personal=['gmail.com','hotmail.com','yahoo.com','outlook.com','icloud.com','qq.com','163.com','126.com'];
    const empty={companyName:'',country:'',website:'',customerType:'未知',contactName:'',email:'',phone:'',products:[],purchaseQuantity:'',longTermPurchase:false,hasProject:false,needsOem:false,targetBudget:'',demandDescription:'',notes:'',followStatus:'未联系'};
    const demos=[{...empty,id:crypto.randomUUID(),companyName:'Solar Grid Partners Ltd.',country:'United Arab Emirates',website:'https://solargrid.example',customerType:'EPC',contactName:'Ahmed Khan',email:'procurement@solargrid.example',phone:'+971 50 000 0000',products:['逆变器','储能电池','太阳能系统'],purchaseQuantity:'200台逆变器 + 1MWh储能电池',longTermPurchase:true,hasProject:true,demandDescription:'正在做商业屋顶太阳能项目，需要50kW逆变器、储能电池和交付周期信息。',notes:'优先确认并网标准和认证需求。'}, {...empty,id:crypto.randomUUID(),companyName:'Mike Personal Inquiry',country:'Chile',customerType:'个人',contactName:'Mike',email:'mikebuyer@gmail.com',products:['UPS'],purchaseQuantity:'1台',demandDescription:'lowest price?'}];
    let customers=JSON.parse(localStorage.getItem(STORAGE)||'null')||demos, selectedId=customers[0]?.id||null, sortDesc=true, selectedProducts=[];
    const $=s=>document.querySelector(s), form=$('#leadForm');
    function save(){localStorage.setItem(STORAGE,JSON.stringify(customers))}
    function companyEmail(e){const d=e.split('@')[1]?.trim().toLowerCase();return !!d&&!personal.includes(d)}
    function enough(c){return [c.companyName,c.country,c.customerType!=='未知'?c.customerType:'',c.contactName,c.email,c.phone,c.products.length,c.purchaseQuantity,c.demandDescription].filter(Boolean).length>=5}
    function lowPrice(c){const t=(c.targetBudget+' '+c.demandDescription+' '+c.notes).toLowerCase();return ['lowest price','best price','cheap','最低价','最便宜','低价','报价'].some(w=>t.includes(w))&&!c.hasProject&&c.demandDescription.trim().length<28}
    function level(s){return s>=80?['A','A类客户，重点跟进']:s>=60?['B','B类客户，可以认真跟进']:s>=40?['C','C类客户，简单回复，继续观察']:['D','D类客户，低优先级']}
    function advice(s){return s>=80?'建议尽快联系，询问项目参数、认证要求、交付时间，并安排视频会议。':s>=60?'发送产品目录和基础报价，继续确认采购能力、采购周期和项目真实性。':s>=40?'先发标准资料，补问公司背景和具体数量，不投入太多定制报价时间。':'模板化回复即可，先要求补充公司、项目和数量信息，不建议深度跟进。'}
    function next(s,c){return s>=80?(c.hasProject?'整理项目参数清单，24小时内电话或WhatsApp跟进。':'快速确认项目细节后安排会议。'):s>=60?'发送目录、认证清单和初步价格区间，要求确认年采购量。':s>=40?'发送标准介绍邮件，设置3天后轻量跟进。':'发送信息补充模板；若无回复或仍只问低价，标记为无效客户。'}
    function score(c){let s=0,pos=[],neg=[]; if(c.website.trim()){s+=15;pos.push('有公司网站 +15')} if(c.email.trim()&&companyEmail(c.email)){s+=10;pos.push('使用公司邮箱 +10')} if(goodTypes.has(c.customerType)){s+=20;pos.push(`客户类型为${c.customerType} +20`)} if(c.purchaseQuantity.trim()){s+=15;pos.push('有明确采购数量 +15')} if(c.longTermPurchase){s+=15;pos.push('有长期采购意向 +15')} if(c.hasProject){s+=15;pos.push('有具体项目 +15')} if(c.demandDescription.trim().length>=28){s+=10;pos.push('需求描述较具体 +10')} if(c.needsOem){s+=10;pos.push('需要 OEM/ODM +10')} if(c.customerType==='个人'){s-=30;neg.push('只是个人客户 -30')} if(!enough(c)){s-=20;neg.push('信息太少 -20')} if(lowPrice(c)){s-=15;neg.push('只问最低价但没有项目细节 -15')} s=Math.max(0,Math.min(100,s)); const l=level(s); return {score:s,level:{code:l[0],label:l[1]},positive:pos,negative:neg,advice:advice(s),nextAction:next(s,c)}}
    function formData(){return {...empty,companyName:form.companyName.value.trim(),country:form.country.value.trim(),website:form.website.value.trim(),customerType:form.customerType.value,contactName:form.contactName.value.trim(),email:form.email.value.trim(),phone:form.phone.value.trim(),products:selectedProducts,purchaseQuantity:form.purchaseQuantity.value.trim(),longTermPurchase:form.longTermPurchase.checked,hasProject:form.hasProject.checked,needsOem:form.needsOem.checked,targetBudget:form.targetBudget.value.trim(),demandDescription:form.demandDescription.value.trim(),notes:form.notes.value.trim(),followStatus:form.followStatus.value}}
    function renderSetup(){form.customerType.innerHTML=types.map(t=>`<option>${t}</option>`).join(''); form.followStatus.innerHTML=statuses.map(s=>`<option>${s}</option>`).join(''); $('#productChips').innerHTML=products.map(p=>`<button class="chip" type="button" data-product="${p}">${p}</button>`).join(''); $('#productChips').onclick=e=>{if(!e.target.dataset.product)return; const p=e.target.dataset.product; selectedProducts=selectedProducts.includes(p)?selectedProducts.filter(x=>x!==p):[...selectedProducts,p]; renderChips(); preview()}}
    function renderChips(){$$('#productChips .chip').forEach(b=>b.classList.toggle('selected',selectedProducts.includes(b.dataset.product)))}
    function $$(s){return Array.from(document.querySelectorAll(s))}
    function cls(c){return c.toLowerCase()}
    function preview(){const sc=score(formData()); $('#previewScore').className=`score ${cls(sc.level.code)}`; $('#previewScore').innerHTML=`${sc.score} <span>${sc.level.code}类</span>`}
    function render(){const scored=customers.map(c=>({...c,scoring:score(c)})); $('#summary').innerHTML=['A','B','C','D'].map(l=>`<div><strong>${scored.filter(c=>c.scoring.level.code===l).length}</strong><span>${l}类</span></div>`).join(''); const q=$('#searchInput').value.trim().toLowerCase(); const rows=scored.filter(c=>!q||[c.companyName,c.country,c.customerType,c.products.join(','),c.followStatus].join(' ').toLowerCase().includes(q)).sort((a,b)=>sortDesc?b.scoring.score-a.scoring.score:a.scoring.score-b.scoring.score); $('#customerRows').innerHTML=rows.map(c=>`<tr data-id="${c.id}" class="${selectedId===c.id?'selected':''}"><td>${c.companyName}</td><td>${c.country}</td><td>${c.customerType}</td><td>${c.products.join('、')||'未填写'}</td><td><strong>${c.scoring.score}</strong></td><td><span class="badge ${cls(c.scoring.level.code)}">${c.scoring.level.code}</span></td><td><select data-status="${c.id}">${statuses.map(s=>`<option ${s===c.followStatus?'selected':''}>${s}</option>`).join('')}</select></td></tr>`).join(''); const sel=scored.find(c=>c.id===selectedId)||rows[0]; selectedId=sel?.id||null; renderDetail(sel); }
    function info(k,v){return `<div class="item"><small>${k}</small><strong>${v||'未填写'}</strong></div>`}
    function list(title,items,neg=false){return `<div class="reason ${neg?'neg':''}"><h4>${title}</h4>${items.length?`<ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul>`:`<p>${neg?'暂无明显扣分项':'暂无明显加分项'}</p>`}</div>`}
    function renderDetail(c){$('#deleteBtn').style.display=c?'inline-flex':'none'; if(!c){$('#detailView').innerHTML='<div class="empty">暂无客户。录入第一个客户后，这里会显示完整评分和跟进建议。</div>';return} const s=c.scoring; $('#detailView').innerHTML=`<div class="detail-grid"><article class="block"><div class="company"><div><h3>${c.companyName}</h3><p>${c.country||'未填写国家'} · ${c.customerType}</p></div><div class="score ${cls(s.level.code)}">${s.score}<span>${s.level.code}类</span></div></div><div class="info">${info('联系人',c.contactName)}${info('邮箱',c.email)}${info('WhatsApp / 电话',c.phone)}${info('公司网站',c.website)}${info('感兴趣产品',c.products.join('、'))}${info('预计采购数量',c.purchaseQuantity)}${info('目标价格/预算',c.targetBudget)}${info('跟进状态',c.followStatus)}</div><div class="flags"><span class="flag ${c.longTermPurchase?'on':''}">长期采购</span><span class="flag ${c.hasProject?'on':''}">具体项目</span><span class="flag ${c.needsOem?'on':''}">OEM/ODM</span></div><div class="text"><h4>需求描述</h4><p>${c.demandDescription||'未填写'}</p></div><div class="text"><h4>备注</h4><p>${c.notes||'未填写'}</p></div></article><aside class="block"><h3>${s.level.label}</h3><div class="reasons">${list('得分原因',s.positive)}${list('扣分原因',s.negative,true)}</div><div class="recommend"><h4>跟进建议</h4><p>${s.advice}</p></div><div class="recommend"><h4>下一步动作</h4><p>${s.nextAction}</p></div></aside></div>`}
    form.addEventListener('input',preview); form.addEventListener('change',preview); form.onsubmit=e=>{e.preventDefault(); const c=formData(); if(!c.companyName||!c.country)return; c.id=crypto.randomUUID(); c.createdAt=new Date().toISOString(); customers=[c,...customers]; selectedId=c.id; save(); form.reset(); selectedProducts=[]; renderChips(); preview(); render()}; $('#resetBtn').onclick=()=>{form.reset(); selectedProducts=[]; renderChips(); preview()}; $('#sortBtn').onclick=()=>{sortDesc=!sortDesc; render()}; $('#searchInput').oninput=render; $('#customerRows').onclick=e=>{const select=e.target.closest('select[data-status]'); if(select){customers=customers.map(c=>c.id===select.dataset.status?{...c,followStatus:select.value}:c); save(); render(); return} const tr=e.target.closest('tr'); if(tr){selectedId=tr.dataset.id; render()}}; $('#deleteBtn').onclick=()=>{customers=customers.filter(c=>c.id!==selectedId); selectedId=customers[0]?.id||null; save(); render()}; renderSetup(); preview(); render();
  </script>
</body>
</html>
